<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MainQuest Cebu</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('https://wa-cdn.nyc3.digitaloceanspaces.com/user-data/production/533e590a-d50a-4172-8359-fb6cedf8448e/uploads/images/3a838bbd5a293b42233cb74a83b89136.jpeg') no-repeat center center fixed;
      background-size: cover;
      color: #f3e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 650px;
      padding: 30px;
    }

    .logo {
      width: 260px;
      max-width: 80%;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.6));
    }

    h1 {
      font-family: 'Uncial Antiqua', cursive;
      color: #ffd84d;
      font-size: 38px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      opacity: 0.85;
      margin-bottom: 30px;
      font-size: 16px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a.button {
      display: block;
      padding: 14px 16px;
      border-radius: 12px;
      text-decoration: none;
      color: #f3e9ff;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.18);
      transition: 0.25s ease;
      font-size: 16px;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }

    a.button:hover {
      background: rgba(255, 216, 77, 0.15);
      border-color: rgba(255, 216, 77, 0.5);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- click sound -->
  <audio id="clickSound" src="https://mainquestcebu.github.io/main/mixkit-select-click-1109.wav" preload="auto"></audio>

  <div class="container">

    <img class="logo" src="https://mainquestcebu.github.io/main/widelogo.png" alt="MainQuest Logo" />

    <h1>Welcome Adventurer</h1>
    <p>What fate brings you to our doors?</p>

    <div class="buttons">
      <a class="button" href="https://www.worldanvil.com/w/najarune-mainquestcebu">World Lore</a>
      <a class="button" href="https://mainquestcebu.github.io/main/translator.html">Najarin Translator</a>
      <a class="button" href="https://mainquestcebu.github.io/main/spell-builder.html">Spell Builder</a>
      <a class="button" href="https://mainquestcebu.github.io/main/card-game.html">MainQuest Cebu: The Card Game</a>
      <a class="button" href="https://www.facebook.com/sabersturm">Learn Combat</a>
    </div>

    <footer>MainQuest Cebu</footer>
  </div>

  <script>
    const clickSound = document.getElementById('clickSound');

    document.querySelectorAll('a.button').forEach(btn => {
      btn.addEventListener('click', function (e) {
        clickSound.currentTime = 0;
        clickSound.play();
      });
    });
  </script>

</body>
</html>
